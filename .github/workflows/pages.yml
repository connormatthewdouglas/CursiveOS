name: Deploy dashboard to Pages

# Publishes the static CursiveRoot dashboard (dashboard/) to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
# After that, every change to dashboard/ redeploys automatically.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
